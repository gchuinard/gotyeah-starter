[pytest]
# Starlette >=1.3 déprécie l'usage de httpx (au profit de httpx2) dans son TestClient.
# L'app n'utilise le TestClient qu'en test ; on ne migre pas le runtime vers httpx2 pour
# un warning cosmétique. On filtre uniquement ce message précis.
filterwarnings =
    ignore:Using .httpx. with .starlette.testclient. is deprecated.*
