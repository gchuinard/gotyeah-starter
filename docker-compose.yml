services:
  gotyeah-starter:
    build: ./backend
    container_name: gotyeah-starter
    restart: unless-stopped
    env_file: .env
    networks:
      - default
      - npm
    # Pas de publication de port hôte : NPM joint le conteneur via le réseau
    # partagé et le proxifie par son nom (gotyeah-starter:8080).

networks:
  # Réseau par défaut du projet (gotyeah-starter_default), créé automatiquement.
  default:
  # Réseau partagé avec Nginx Proxy Manager (c'est SON réseau, NPM y est connecté
  # en permanence). Externe => doit préexister, géré par la stack NPM. Permet à
  # NPM de résoudre « gotyeah-starter » sans connexion manuelle.
  npm:
    external: true
    name: nginx-proxy-manager_default
